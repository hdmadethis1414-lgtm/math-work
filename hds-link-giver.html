<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everest Link Randomizer - Standalone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1a1a1e; color: #f2f3f5; }
        .discord-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .modal-backdrop { background-color: rgba(0,0,0,0.7); }
    </style>
</head>
<body class="min-h-screen p-4">
    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0';
        import * as lucide from 'https://esm.sh/lucide-react@0.344.0';

        const { createElement: h } = React;
        const SUPABASE_URL = 'https://cstwudizoksseiualaom.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzdHd1ZGl6b2tzc2VpdWFsYW9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1Njk2NDksImV4cCI6MjA5MDE0NTY0OX0._soR9AVSeLCSkdOiX4GvbrDYy-Fikri0Cz_dyB3LCAM';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Home Component
        const Home = ({ onGoToAdmin, onGoToChat, onGoToVideo, sections }) => {
            const [sort, setSort] = useState('newest');
            const [sectionId, setSectionId] = useState('all');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);

            const extractVideoId = (url) => {
                const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
                const match = url.match(regExp);
                return (match && match[7].length === 11) ? match[7] : url;
            };

            const fetchRandomLink = async () => {
                setLoading(true);
                try {
                    const body = { sort };
                    if (sectionId !== 'all') body.section_id = sectionId;
                    const { data, error } = await supabase.functions.invoke('discord-links', { body });
                    if (error) {
                        const errorMsg = await error?.context?.text();
                        throw new Error(errorMsg || error?.message || "Failed to fetch link");
                    }
                    if (data?.error) throw new Error(data.error);
                    setResult(data.url);
                } catch (err) {
                    alert(err.message);
                    setResult(null);
                } finally {
                    setLoading(false);
                }
            };

            const activeSection = sections.find(s => s.id === sectionId);
            const displayTitle = activeSection ? `${activeSection.name} Randomizer` : "Link Generator";

            return h('div', { className: 'min-h-screen flex items-center justify-center relative' }, [
                h('div', { key: 'nav', className: 'absolute top-0 right-0 flex gap-2 p-4' }, [
                    h('button', {
                        key: 'video',
                        onClick: onGoToVideo,
                        className: 'p-3 bg-[#2b2d31] hover:bg-[#35373c] text-gray-400 rounded-full transition-all',
                        title: 'Video Player'
                    }, h(lucide.Video, { className: 'w-6 h-6' })),
                    h('button', {
                        key: 'chat',
                        onClick: onGoToChat,
                        className: 'p-3 bg-[#2b2d31] hover:bg-[#35373c] text-gray-400 rounded-full transition-all',
                        title: 'Public Chat'
                    }, h(lucide.MessageSquare, { className: 'w-6 h-6' })),
                    h('button', {
                        key: 'admin',
                        onClick: onGoToAdmin,
                        className: 'p-3 bg-[#2b2d31] hover:bg-[#35373c] text-gray-400 rounded-full transition-all group',
                        title: 'Admin Panel'
                    }, h(lucide.Settings, { className: 'w-6 h-6 group-hover:rotate-45 transition-transform' }))
                ]),

                h('div', { key: 'main', className: 'w-full max-w-md discord-shadow bg-[#232428] rounded-2xl p-8 border border-[#2b2d31]' }, [
                    h('div', { key: 'header', className: 'text-center mb-8' }, [
                        h('div', { key: 'icon', className: 'mx-auto bg-blue-500/10 w-16 h-16 rounded-full flex items-center justify-center mb-4' }, 
                            h(lucide.Link, { className: 'w-8 h-8 text-blue-500' })
                        ),
                        h('h1', { key: 'title', className: 'text-3xl font-bold gradient-text mb-2' }, displayTitle),
                        h('p', { key: 'subtitle', className: 'text-gray-400 text-sm' }, 'Discover links shared in the Everest community')
                    ]),

                    h('div', { key: 'content', className: 'space-y-6' }, [
                        h('div', { key: 'section-select', className: 'space-y-2' }, [
                            h('label', { key: 'label', className: 'text-xs font-bold text-gray-500 uppercase tracking-widest' }, 'Select Section'),
                            h('select', { 
                                key: 'select',
                                className: 'w-full bg-[#1e1f22] border-none rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none',
                                value: sectionId,
                                onChange: (e) => setSectionId(e.target.value)
                            }, [
                                h('option', { key: 'all', value: 'all' }, 'All Sections'),
                                ...sections.map(s => h('option', { key: s.id, value: s.id }, s.name))
                            ])
                        ]),

                        h('div', { key: 'sort', className: 'space-y-3 bg-[#1e1f22] p-4 rounded-xl' }, [
                            h('label', { key: 'label', className: 'text-xs font-bold text-gray-500 uppercase tracking-widest' }, 'Pool Sorting'),
                            h('div', { key: 'options', className: 'flex flex-col space-y-2' }, [
                                ['newest', 'Newest First'], ['oldest', 'Oldest First']
                            ].map(([val, label]) => 
                                h('label', { key: val, className: 'flex items-center space-x-3 p-2 rounded-md hover:bg-[#2b2d31] cursor-pointer' }, [
                                    h('input', { 
                                        key: 'radio',
                                        type: 'radio', 
                                        name: 'sort', 
                                        value: val, 
                                        checked: sort === val,
                                        className: 'w-4 h-4 accent-blue-500',
                                        onChange: (e) => setSort(e.target.value)
                                    }),
                                    h('span', { key: 'text', className: 'text-sm font-medium' }, label)
                                ])
                            ))
                        ]),

                        h('button', { 
                            key: 'fetch-btn',
                            onClick: fetchRandomLink,
                            disabled: loading,
                            className: 'w-full py-4 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2'
                        }, loading ? [
                            h(lucide.RefreshCw, { key: 'icon', className: 'w-5 h-5 animate-spin' }),
                            'Drawing...'
                        ] : 'Get Random Link'),

                        result && h('div', { key: 'result', className: 'mt-6 bg-[#1e1f22] p-4 rounded-xl border border-blue-500/20 space-y-4' }, [
                            h('div', { key: 'url-section' }, [
                                h('label', { key: 'label', className: 'text-xs font-bold text-gray-500 uppercase tracking-widest block mb-2' }, 'Result'),
                                h('p', { key: 'url', className: 'text-sm break-all mb-4' }, result),
                            ]),
                            h('div', { key: 'actions', className: 'space-y-2' }, [
                                h('a', { 
                                    key: 'open',
                                    href: result, 
                                    target: '_blank', 
                                    className: 'w-full py-2 flex items-center justify-center gap-2 border border-blue-500/30 rounded-lg hover:bg-blue-500/10 text-sm font-semibold'
                                }, [
                                    'Open Link',
                                    h(lucide.ExternalLink, { key: 'icon', className: 'w-4 h-4' })
                                ]),
                                (result.includes("youtube.com") || result.includes("youtu.be")) && h('button', {
                                    key: 'watch',
                                    onClick: () => {
                                        const videoId = extractVideoId(result);
                                        localStorage.setItem('pending_video_id', videoId);
                                        onGoToVideo();
                                    },
                                    className: 'w-full py-2 flex items-center justify-center gap-2 bg-[#2b2d31] rounded-lg hover:bg-[#35373c] text-sm font-semibold'
                                }, [
                                    h(lucide.Video, { key: 'icon', className: 'w-4 h-4' }),
                                    'Watch Video'
                                ])
                            ])
                        ]),

                        !result && !loading && h('div', { key: 'empty', className: 'text-center py-6 text-gray-500 italic border-2 border-dashed border-[#2b2d31] rounded-xl' }, 'Click the button to draw a link'),

                        h('div', { key: 'footer', className: 'pt-6 mt-4 border-t border-[#2b2d31] text-center' }, 
                            h('a', { 
                                href: 'https://discord.gg/U3adwTf9dy', 
                                target: '_blank', 
                                className: 'text-blue-400 hover:text-blue-300 font-bold flex items-center justify-center gap-2'
                            }, [
                                h(lucide.MessageSquare, { key: 'icon', className: 'w-4 h-4' }),
                                'join our discord :)'
                            ])
                        )
                    ])
                ])
            ]);
        };

        // Public Chat Component
        const PublicChat = ({ onBack }) => {
            const [messages, setMessages] = useState([]);
            const [newMessage, setNewMessage] = useState('');
            const [username, setUsername] = useState('');
            const [tempUsername, setTempUsername] = useState('');
            const [isUsernameSet, setIsUsernameSet] = useState(false);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                const storedUsername = localStorage.getItem('chat_username');
                if (storedUsername) {
                    setUsername(storedUsername);
                    setIsUsernameSet(true);
                }

                fetchMessages();

                const channel = supabase
                    .channel('public-chat')
                    .on('postgres_changes', {
                        event: 'INSERT',
                        schema: 'public',
                        table: 'public_chat_messages'
                    }, (payload) => {
                        setMessages(prev => [...prev, payload.new]);
                    })
                    .subscribe();

                return () => { supabase.removeChannel(channel); };
            }, []);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const fetchMessages = async () => {
                const { data } = await supabase
                    .from('public_chat_messages')
                    .select('*')
                    .order('created_at', { ascending: true })
                    .limit(100);
                setMessages(data || []);
            };

            const handleSetUsername = (e) => {
                e.preventDefault();
                if (!tempUsername.trim()) return;
                setUsername(tempUsername.trim());
                localStorage.setItem('chat_username', tempUsername.trim());
                setIsUsernameSet(true);
            };

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!newMessage.trim() || !username) return;
                try {
                    const { error } = await supabase.from('public_chat_messages').insert([{
                        username,
                        message: newMessage.trim()
                    }]);
                    if (error) throw error;
                    setNewMessage('');
                } catch (err) { alert(err.message); }
            };

            if (!isUsernameSet) {
                return h('div', { className: 'min-h-screen flex flex-col items-center justify-center p-4 bg-[#1a1a1e] relative' }, [
                    h('button', { key: 'back', onClick: onBack, className: 'absolute top-4 left-4 p-2 bg-[#2b2d31] rounded-full' }, 
                        h(lucide.ArrowLeft, { className: 'w-5 h-5' })
                    ),
                    h('div', { key: 'modal', className: 'w-full max-w-sm bg-[#232428] p-8 rounded-2xl discord-shadow border border-[#2b2d31]' }, [
                        h('div', { key: 'header', className: 'text-center mb-6' }, [
                            h(lucide.User, { key: 'icon', className: 'w-12 h-12 text-blue-500 mx-auto mb-2' }),
                            h('h2', { key: 'title', className: 'text-xl font-bold' }, 'Join Public Chat'),
                            h('p', { key: 'subtitle', className: 'text-sm text-gray-400' }, 'Enter a display name to participate')
                        ]),
                        h('form', { key: 'form', onSubmit: handleSetUsername, className: 'space-y-4' }, [
                            h('input', { 
                                key: 'input',
                                placeholder: 'Display Name',
                                className: 'w-full bg-[#1e1f22] p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500',
                                value: tempUsername,
                                onChange: (e) => setTempUsername(e.target.value),
                                required: true
                            }),
                            h('button', { key: 'submit', type: 'submit', className: 'w-full py-3 bg-blue-600 rounded-lg font-bold' }, 'Enter Chat')
                        ])
                    ])
                ]);
            }

            return h('div', { className: 'min-h-screen p-4 md:p-8 max-w-4xl mx-auto flex flex-col h-screen overflow-hidden' }, [
                h('div', { key: 'header', className: 'flex items-center justify-between mb-6 shrink-0' }, [
                    h('div', { key: 'left', className: 'flex items-center gap-3' }, [
                        h('button', { key: 'back', onClick: onBack, className: 'p-2 bg-[#2b2d31] rounded-full' }, 
                            h(lucide.ArrowLeft, { className: 'w-5 h-5' })
                        ),
                        h(lucide.MessageSquare, { key: 'icon', className: 'w-8 h-8 text-blue-500' }),
                        h('h1', { key: 'title', className: 'text-3xl font-bold gradient-text' }, 'Public Chat')
                    ]),
                    h('button', { key: 'change', onClick: () => setIsUsernameSet(false), className: 'text-xs text-blue-500 hover:underline' }, 'Change Name')
                ]),
                h('div', { key: 'chat', className: 'bg-[#232428] rounded-2xl discord-shadow border border-[#2b2d31] flex flex-col flex-1 overflow-hidden' }, [
                    h('div', { key: 'info', className: 'p-4 border-b border-[#2b2d31] shrink-0' }, 
                        h('p', { className: 'text-sm text-gray-400' }, [
                            'Chatting as: ',
                            h('span', { key: 'name', className: 'text-blue-500 font-bold' }, username)
                        ])
                    ),
                    h('div', { key: 'messages', className: 'flex-1 overflow-y-auto p-4 space-y-3' }, [
                        ...messages.map(msg => 
                            h('div', { 
                                key: msg.id, 
                                className: msg.username === username ? 'bg-blue-500/20 ml-auto max-w-[85%] p-3 rounded-lg' : 'bg-[#1e1f22] max-w-[85%] p-3 rounded-lg'
                            }, [
                                h('p', { key: 'user', className: 'text-xs font-bold text-blue-500 mb-1' }, msg.username),
                                h('p', { key: 'text', className: 'text-sm break-words' }, msg.message),
                                h('p', { key: 'time', className: 'text-[10px] text-gray-500 mt-1 text-right' }, 
                                    new Date(msg.created_at).toLocaleTimeString()
                                )
                            ])
                        ),
                        h('div', { key: 'end', ref: messagesEndRef })
                    ]),
                    h('form', { key: 'input', onSubmit: sendMessage, className: 'p-4 border-t border-[#2b2d31] flex gap-2 shrink-0' }, [
                        h('input', {
                            key: 'field',
                            placeholder: 'Type a message...',
                            className: 'flex-1 bg-[#1e1f22] p-3 rounded-lg outline-none',
                            value: newMessage,
                            onChange: (e) => setNewMessage(e.target.value),
                            autoComplete: 'off'
                        }),
                        h('button', { key: 'send', type: 'submit', className: 'px-4 py-3 bg-blue-600 rounded-lg', disabled: !newMessage.trim() }, 
                            h(lucide.Send, { className: 'w-4 h-4' })
                        )
                    ])
                ])
            ]);
        };

        // Admin Component
        const Admin = ({ onBack, sections, onRefreshSections }) => {
            const [authorized, setAuthorized] = useState(false);
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [bulkMode, setBulkMode] = useState(false);
            const [linkUrl, setLinkUrl] = useState('');
            const [linkSectionId, setLinkSectionId] = useState('');
            const [newSectionName, setNewSectionName] = useState('');
            const [manageSectionId, setManageSectionId] = useState('');
            const [links, setLinks] = useState([]);

            // Admin Chat State
            const [chatMessages, setChatMessages] = useState([]);
            const [chatNewMessage, setChatNewMessage] = useState('');
            const [chatUsername, setChatUsername] = useState('');
            const [chatTempUsername, setChatTempUsername] = useState('');
            const [isChatUsernameSet, setIsChatUsernameSet] = useState(false);
            const chatMessagesEndRef = useRef(null);

            useEffect(() => {
                if (authorized && manageSectionId) {
                    fetchLinksBySection(manageSectionId);
                }
            }, [authorized, manageSectionId]);

            useEffect(() => {
                if (authorized) {
                    const storedUsername = localStorage.getItem('admin_chat_username');
                    if (storedUsername) {
                        setChatUsername(storedUsername);
                        setIsChatUsernameSet(true);
                    }
                    fetchChatMessages();

                    const channel = supabase
                        .channel('admin-chat-panel')
                        .on('postgres_changes', {
                            event: 'INSERT',
                            schema: 'public',
                            table: 'admin_chat_messages'
                        }, (payload) => {
                            setChatMessages(prev => [...prev, payload.new]);
                        })
                        .subscribe();

                    return () => { supabase.removeChannel(channel); };
                }
            }, [authorized]);

            useEffect(() => {
                chatMessagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [chatMessages, isChatUsernameSet]);

            const fetchLinksBySection = async (id) => {
                const { data } = await supabase.from('discord_links').select('*').eq('section_id', id).order('created_at', { ascending: false });
                setLinks(data || []);
            };

            const fetchChatMessages = async () => {
                const { data } = await supabase
                    .from('admin_chat_messages')
                    .select('*')
                    .order('created_at', { ascending: true })
                    .limit(100);
                setChatMessages(data || []);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                const encoder = new TextEncoder();
                const data = encoder.encode(password);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

                if (hashHex === '51cb01923797268a3519781d8fc3b2174f91d1866d29dbd5712e5336dbbe46cb') {
                    setAuthorized(true);
                } else {
                    alert('Invalid password');
                }
            };

            const handleSetChatUsername = (e) => {
                e.preventDefault();
                if (!chatTempUsername.trim()) return;
                setChatUsername(chatTempUsername.trim());
                localStorage.setItem('admin_chat_username', chatTempUsername.trim());
                setIsChatUsernameSet(true);
            };

            const handleSendChatMessage = async (e) => {
                e.preventDefault();
                if (!chatNewMessage.trim() || !chatUsername) return;
                try {
                    const { error } = await supabase.from('admin_chat_messages').insert([{
                        username: chatUsername,
                        message: chatNewMessage.trim()
                    }]);
                    if (error) throw error;
                    setChatNewMessage('');
                } catch (err) { alert(err.message); }
            };

            const handleAddLink = async (e) => {
                e.preventDefault();
                if (!linkSectionId) return alert('Select a section');
                setLoading(true);
                try {
                    const urls = bulkMode ? linkUrl.split(/[\s\n,]+/).filter(u => u.trim() !== '') : [linkUrl];
                    const toInsert = urls.map(url => ({
                        url,
                        section_id: linkSectionId,
                        message_id: `manual-${Date.now()}-${Math.random().toString(36).substr(2,9)}`,
                        channel_id: 'manual',
                        created_at: new Date().toISOString()
                    }));
                    const { error } = await supabase.from('discord_links').insert(toInsert);
                    if (error) throw error;
                    alert('Added successfully!');
                    setLinkUrl('');
                    if (manageSectionId === linkSectionId) fetchLinksBySection(manageSectionId);
                } catch (err) { alert(err.message); } finally { setLoading(false); }
            };

            const handleAddSection = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const { error } = await supabase.from('link_sections').insert([{ name: newSectionName }]);
                    if (error) throw error;
                    alert('Section created!');
                    setNewSectionName('');
                    onRefreshSections();
                } catch (err) { alert(err.message); } finally { setLoading(false); }
            };

            const handleDeleteSection = async (id, name) => {
                if (!confirm(`Are you sure you want to delete the section "${name}"? All links in this section will also be deleted.`)) return;
                try {
                    await supabase.from('discord_links').delete().eq('section_id', id);
                    const { error } = await supabase.from('link_sections').delete().eq('id', id);
                    if (error) throw error;
                    alert('Section and its links deleted!');
                    onRefreshSections();
                    if (manageSectionId === id) setManageSectionId('');
                } catch (err) { alert(err.message); }
            };

            const handleDeleteLink = async (id) => {
                if (!confirm('Delete this link?')) return;
                try {
                    const { error } = await supabase.from('discord_links').delete().eq('id', id);
                    if (error) throw error;
                    fetchLinksBySection(manageSectionId);
                } catch (err) { alert(err.message); }
            };

            if (!authorized) {
                return h('div', { className: 'min-h-screen flex items-center justify-center relative' }, [
                    h('button', { 
                        key: 'back',
                        onClick: onBack, 
                        className: 'absolute top-4 left-4 p-2 bg-[#2b2d31] rounded-full' 
                    }, h(lucide.ArrowLeft, { className: 'w-5 h-5' })),
                    h('div', { key: 'modal', className: 'w-full max-w-sm bg-[#232428] p-8 rounded-2xl discord-shadow border border-[#2b2d31]' }, [
                        h('div', { key: 'header', className: 'text-center mb-6' }, [
                            h(lucide.Shield, { key: 'icon', className: 'w-12 h-12 text-blue-500 mx-auto mb-2' }),
                            h('h2', { key: 'title', className: 'text-xl font-bold' }, 'Admin Access')
                        ]),
                        h('form', { key: 'form', onSubmit: handleLogin, className: 'space-y-4' }, [
                            h('input', { 
                                key: 'input',
                                type: 'password', 
                                placeholder: 'Password',
                                className: 'w-full bg-[#1e1f22] p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500',
                                value: password,
                                onChange: (e) => setPassword(e.target.value)
                            }),
                            h('button', { key: 'submit', type: 'submit', className: 'w-full py-3 bg-blue-600 rounded-lg font-bold' }, 'Unlock Panel')
                        ])
                    ])
                ]);
            }

            return h('div', { className: 'max-w-7xl mx-auto py-8 px-4 flex flex-col h-screen overflow-hidden' }, [
                h('div', { key: 'header', className: 'flex items-center justify-between mb-6 shrink-0' }, [
                    h('div', { key: 'left', className: 'flex items-center gap-4' }, [
                        h('button', { key: 'back', onClick: onBack, className: 'p-2 bg-[#2b2d31] rounded-full' }, h(lucide.ArrowLeft, { className: 'w-5 h-5' })),
                        h('h1', { key: 'title', className: 'text-3xl font-bold gradient-text' }, 'Admin Panel')
                    ]),
                    h('button', { key: 'lock', onClick: () => setAuthorized(false), className: 'px-4 py-2 bg-[#2b2d31] rounded-lg' }, 'Lock')
                ]),

                h('div', { key: 'content', className: 'grid grid-cols-1 lg:grid-cols-3 gap-8 flex-1 overflow-hidden' }, [
                    // Main Admin Content
                    h('div', { key: 'main', className: 'lg:col-span-2 space-y-8 overflow-y-auto pr-2' }, [
                        h('div', { key: 'top-cards', className: 'grid grid-cols-1 md:grid-cols-2 gap-8' }, [
                            // Add Link Card
                            h('div', { key: 'add-link', className: 'bg-[#232428] p-6 rounded-2xl discord-shadow border border-[#2b2d31]' }, [
                                h('div', { key: 'header', className: 'flex items-center justify-between mb-6' }, [
                                    h('h3', { key: 'title', className: 'font-bold' }, 'Add Manual Link'),
                                    h('div', { key: 'bulk', className: 'flex items-center gap-2' }, [
                                        h('span', { key: 'label', className: 'text-xs text-gray-400' }, 'Bulk'),
                                        h('input', { 
                                            key: 'checkbox',
                                            type: 'checkbox', 
                                            checked: bulkMode, 
                                            onChange: (e) => setBulkMode(e.target.checked),
                                            className: 'w-4 h-4'
                                        })
                                    ])
                                ]),
                                h('form', { key: 'form', onSubmit: handleAddLink, className: 'space-y-4' }, [
                                    bulkMode ? 
                                        h('textarea', { 
                                            key: 'textarea',
                                            placeholder: 'Paste links here...',
                                            className: 'w-full bg-[#1e1f22] p-3 rounded-lg h-32 outline-none',
                                            value: linkUrl,
                                            onChange: (e) => setLinkUrl(e.target.value)
                                        }) :
                                        h('input', { 
                                            key: 'input',
                                            placeholder: 'https://...',
                                            className: 'w-full bg-[#1e1f22] p-3 rounded-lg outline-none',
                                            value: linkUrl,
                                            onChange: (e) => setLinkUrl(e.target.value)
                                        }),
                                    h('select', { 
                                        key: 'select',
                                        className: 'w-full bg-[#1e1f22] p-3 rounded-lg outline-none',
                                        value: linkSectionId,
                                        onChange: (e) => setLinkSectionId(e.target.value)
                                    }, [
                                        h('option', { key: 'default', value: '' }, 'Select Section'),
                                        ...sections.map(s => h('option', { key: s.id, value: s.id }, s.name))
                                    ]),
                                    h('button', { 
                                        key: 'submit',
                                        type: 'submit', 
                                        disabled: loading,
                                        className: 'w-full py-3 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-bold rounded-lg'
                                    }, loading ? 'Adding...' : 'Add Links')
                                ])
                            ]),

                            // Create Section Card
                            h('div', { key: 'create-section', className: 'bg-[#232428] p-6 rounded-2xl discord-shadow border border-[#2b2d31]' }, [
                                h('div', { key: 'header', className: 'flex items-center gap-2 mb-6' }, [
                                    h(lucide.FolderPlus, { key: 'icon', className: 'w-5 h-5 text-blue-500' }),
                                    h('h3', { key: 'title', className: 'font-bold' }, 'Create Section')
                                ]),
                                h('form', { key: 'form', onSubmit: handleAddSection, className: 'space-y-4' }, [
                                    h('input', { 
                                        key: 'input',
                                        placeholder: 'Section Name',
                                        className: 'w-full bg-[#1e1f22] p-3 rounded-lg outline-none',
                                        value: newSectionName,
                                        onChange: (e) => setNewSectionName(e.target.value)
                                    }),
                                    h('button', { 
                                        key: 'submit',
                                        type: 'submit', 
                                        disabled: loading,
                                        className: 'w-full py-3 bg-[#35373c] hover:bg-[#404249] text-white font-bold rounded-lg'
                                    }, 'Create Section')
                                ])
                            ])
                        ]),

                        // Manage Links
                        h('div', { key: 'manage', className: 'bg-[#232428] p-6 rounded-2xl discord-shadow border border-[#2b2d31]' }, [
                            h('div', { key: 'header', className: 'mb-6' }, [
                                h('h3', { key: 'title', className: 'font-bold mb-4' }, 'Manage Links'),
                                h('select', { 
                                    key: 'select',
                                    className: 'w-full bg-[#1e1f22] p-3 rounded-lg outline-none',
                                    value: manageSectionId,
                                    onChange: (e) => setManageSectionId(e.target.value)
                                }, [
                                    h('option', { key: 'default', value: '' }, 'Select Section to Manage'),
                                    ...sections.map(s => h('option', { key: s.id, value: s.id }, s.name))
                                ])
                            ]),
                            manageSectionId && h('div', { key: 'links', className: 'space-y-3' }, 
                                links.length === 0 ? 
                                    h('p', { key: 'empty', className: 'text-center text-gray-500 py-8 italic' }, 'No links found in this section') :
                                    links.map(link => 
                                        h('div', { key: link.id, className: 'flex items-center justify-between p-3 bg-[#1e1f22] rounded-lg group' }, [
                                            h('p', { key: 'url', className: 'text-sm truncate mr-4 text-blue-400' }, h('a', { href: link.url, target: '_blank' }, link.url)),
                                            h('div', { key: 'actions', className: 'flex items-center gap-2' }, [
                                                h('button', { 
                                                    key: 'edit',
                                                    onClick: () => {
                                                        const newUrl = prompt('Edit URL:', link.url);
                                                        if (newUrl) {
                                                            supabase.from('discord_links').update({ url: newUrl }).eq('id', link.id).then(() => fetchLinksBySection(manageSectionId));
                                                        }
                                                    },
                                                    className: 'p-2 text-blue-500 hover:bg-blue-500/10 rounded-lg' 
                                                }, h(lucide.Edit2, { className: 'w-4 h-4' })),
                                                h('button', { 
                                                    key: 'delete',
                                                    onClick: () => handleDeleteLink(link.id),
                                                    className: 'p-2 text-red-500 hover:bg-red-500/10 rounded-lg' 
                                                }, h(lucide.Trash2, { className: 'w-4 h-4' }))
                                            ])
                                        ])
                                    )
                            )
                        ]),

                        // Existing Sections
                        h('div', { key: 'sections', className: 'bg-[#232428] p-6 rounded-2xl discord-shadow border border-[#2b2d31]' }, [
                            h('h3', { key: 'title', className: 'font-bold mb-4' }, 'Existing Sections'),
                            h('div', { key: 'list', className: 'grid grid-cols-1 md:grid-cols-2 gap-4' }, 
                                sections.map(s => 
                                    h('div', { key: s.id, className: 'flex items-center justify-between p-4 bg-[#1e1f22] rounded-xl group' }, [
                                        h('span', { key: 'name', className: 'font-medium' }, s.name),
                                        h('button', { 
                                            key: 'delete',
                                            onClick: () => handleDeleteSection(s.id, s.name),
                                            className: 'p-2 text-red-500 hover:bg-red-500/10 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity' 
                                        }, h(lucide.Trash2, { className: 'w-4 h-4' }))
                                    ])
                                )
                            )
                        ])
                    ]),

                    // Private Chat Sidebar
                    h('div', { key: 'chat', className: 'bg-[#232428] rounded-2xl discord-shadow border border-[#2b2d31] flex flex-col overflow-hidden' }, [
                        h('div', { key: 'header', className: 'p-4 border-b border-[#2b2d31] shrink-0 flex items-center justify-between' }, [
                            h('div', { key: 'left', className: 'flex items-center gap-2' }, [
                                h(lucide.MessageSquare, { key: 'icon', className: 'w-5 h-5 text-blue-500' }),
                                h('h3', { key: 'title', className: 'font-bold' }, 'Private Chat')
                            ]),
                            isChatUsernameSet && h('button', { key: 'rename', onClick: () => setIsChatUsernameSet(false), className: 'text-[10px] text-blue-500 uppercase font-bold' }, 'Rename')
                        ]),
                        !isChatUsernameSet ? 
                            h('div', { key: 'setup', className: 'flex-1 flex items-center justify-center p-6' }, 
                                h('form', { onSubmit: handleSetChatUsername, className: 'space-y-4 w-full' }, [
                                    h('label', { key: 'label', className: 'text-xs font-bold text-gray-400 uppercase tracking-widest block' }, 'Admin Handle'),
                                    h('input', {
                                        key: 'input',
                                        placeholder: 'Your handle...',
                                        className: 'w-full bg-[#1e1f22] p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500',
                                        value: chatTempUsername,
                                        onChange: (e) => setChatTempUsername(e.target.value),
                                        required: true
                                    }),
                                    h('button', { key: 'submit', type: 'submit', className: 'w-full py-3 bg-blue-600 rounded-lg font-bold' }, 'Start Chatting')
                                ])
                            ) :
                            h('div', { key: 'chat-area', className: 'flex-1 flex flex-col overflow-hidden' }, [
                                h('div', { key: 'messages', className: 'flex-1 overflow-y-auto p-4 space-y-4' }, [
                                    ...chatMessages.map(msg => 
                                        h('div', { key: msg.id, className: `flex flex-col ${msg.username === chatUsername ? 'items-end' : 'items-start'}` }, [
                                            h('div', { key: 'bubble', className: `p-3 rounded-lg max-w-[90%] ${msg.username === chatUsername ? 'bg-blue-500/20' : 'bg-[#1e1f22]'}` }, [
                                                h('p', { key: 'user', className: 'text-[9px] font-bold text-blue-500 mb-1 uppercase tracking-tighter' }, msg.username),
                                                h('p', { key: 'text', className: 'text-sm break-words' }, msg.message)
                                            ]),
                                            h('span', { key: 'time', className: 'text-[9px] text-gray-500 mt-1 px-1' }, new Date(msg.created_at).toLocaleTimeString())
                                        ])
                                    ),
                                    h('div', { key: 'end', ref: chatMessagesEndRef })
                                ]),
                                h('form', { key: 'input', onSubmit: handleSendChatMessage, className: 'p-4 border-t border-[#2b2d31] flex gap-2 shrink-0 bg-black/10' }, [
                                    h('input', {
                                        key: 'field',
                                        placeholder: 'Type a message...',
                                        className: 'flex-1 bg-[#1e1f22] p-3 rounded-lg outline-none text-sm',
                                        value: chatNewMessage,
                                        onChange: (e) => setChatNewMessage(e.target.value),
                                        autoComplete: 'off'
                                    }),
                                    h('button', { key: 'send', type: 'submit', className: 'p-3 bg-blue-600 rounded-lg', disabled: !chatNewMessage.trim() }, 
                                        h(lucide.Send, { className: 'w-4 h-4' })
                                    )
                                ])
                            ])
                    ])
                ])
            ]);
        };

        // Video Player Component
        const VideoPlayer = ({ onBack }) => {
            const [playlist, setPlaylist] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [videoId, setVideoId] = useState('');

            useEffect(() => {
                const stored = localStorage.getItem('video_playlist');
                if (stored) {
                    const parsed = JSON.parse(stored);
                    setPlaylist(parsed);
                }

                const pendingId = localStorage.getItem('pending_video_id');
                if (pendingId) {
                    addToPlaylist(pendingId);
                    localStorage.removeItem('pending_video_id');
                }
            }, []);

            useEffect(() => {
                if (playlist.length > 0) {
                    localStorage.setItem('video_playlist', JSON.stringify(playlist));
                }
            }, [playlist]);

            const addToPlaylist = (id) => {
                if (!id.trim()) return;
                const newVideo = {
                    id: id.trim(),
                    title: `Video ${playlist.length + 1}`,
                    url: `https://www.yout-ube.com/watch?v=${id.trim()}`
                };
                setPlaylist(prev => [...prev, newVideo]);
                setVideoId('');
                if (playlist.length === 0) setCurrentIndex(0);
            };

            const removeFromPlaylist = (index) => {
                setPlaylist(prev => {
                    const updated = prev.filter((_, i) => i !== index);
                    if (currentIndex >= updated.length && updated.length > 0) {
                        setCurrentIndex(updated.length - 1);
                    }
                    return updated;
                });
            };

            const handlePrevious = () => {
                if (currentIndex > 0) setCurrentIndex(currentIndex - 1);
            };

            const handleNext = () => {
                if (currentIndex < playlist.length - 1) setCurrentIndex(currentIndex + 1);
            };

            const currentVideo = playlist[currentIndex];

            return h('div', { className: 'min-h-screen p-4 md:p-8 max-w-7xl mx-auto' }, [
                h('div', { key: 'header', className: 'flex items-center justify-between mb-6' }, [
                    h('div', { key: 'left', className: 'flex items-center gap-3' }, [
                        h('button', { key: 'back', onClick: onBack, className: 'p-2 bg-[#2b2d31] rounded-full' }, 
                            h(lucide.ArrowLeft, { className: 'w-5 h-5' })
                        ),
                        h(lucide.Video, { key: 'icon', className: 'w-8 h-8 text-blue-500' }),
                        h('h1', { key: 'title', className: 'text-3xl font-bold gradient-text' }, 'Video Player')
                    ])
                ]),

                h('div', { key: 'content', className: 'grid grid-cols-1 lg:grid-cols-3 gap-8' }, [
                    // Playlist Sidebar
                    h('div', { key: 'playlist', className: 'bg-[#232428] p-6 rounded-2xl discord-shadow border border-[#2b2d31] space-y-6' }, [
                        h('div', { key: 'add', className: 'space-y-4' }, [
                            h('h3', { key: 'title', className: 'font-bold' }, 'Add to Playlist'),
                            h('input', {
                                key: 'input',
                                placeholder: 'YouTube Video ID',
                                className: 'w-full bg-[#1e1f22] p-3 rounded-lg outline-none',
                                value: videoId,
                                onChange: (e) => setVideoId(e.target.value),
                                onKeyPress: (e) => { if (e.key === 'Enter') addToPlaylist(videoId); }
                            }),
                            h('button', {
                                key: 'btn',
                                onClick: () => addToPlaylist(videoId),
                                className: 'w-full py-3 bg-blue-600 rounded-lg font-bold'
                            }, 'Add Video')
                        ]),
                        h('div', { key: 'list', className: 'space-y-2' }, [
                            h('h3', { key: 'title', className: 'font-bold mb-4' }, `Playlist (${playlist.length})`),
                            h('div', { key: 'videos', className: 'space-y-2 max-h-96 overflow-y-auto' }, [
                                ...playlist.map((video, index) =>
                                    h('div', {
                                        key: index,
                                        onClick: () => setCurrentIndex(index),
                                        className: `flex items-center justify-between p-3 rounded-lg cursor-pointer transition-colors ${index === currentIndex ? 'bg-blue-500/20' : 'bg-[#1e1f22] hover:bg-[#2b2d31]'}`
                                    }, [
                                        h('div', { key: 'info', className: 'min-w-0' }, [
                                            h('p', { key: 'title', className: 'text-sm font-medium truncate' }, video.title),
                                            h('p', { key: 'id', className: 'text-xs text-gray-500 truncate' }, video.id)
                                        ]),
                                        h('button', {
                                            key: 'delete',
                                            onClick: (e) => { e.stopPropagation(); removeFromPlaylist(index); },
                                            className: 'p-2 text-red-500 hover:bg-red-500/10 rounded-lg'
                                        }, h(lucide.Trash2, { className: 'w-4 h-4' }))
                                    ])
                                ),
                                playlist.length === 0 && h('p', { key: 'empty', className: 'text-center text-gray-500 py-8 italic' }, 'Playlist is empty')
                            ])
                        ])
                    ]),

                    // Player Section
                    h('div', { key: 'player', className: 'lg:col-span-2 bg-[#232428] p-6 rounded-2xl discord-shadow border border-[#2b2d31] space-y-6' }, [
                        h('div', { key: 'header', className: 'flex items-center justify-between mb-4' }, [
                            h('h3', { key: 'title', className: 'font-bold' }, 'Now Playing'),
                            currentVideo && h('a', {
                                key: 'link',
                                href: currentVideo.url,
                                target: '_blank',
                                className: 'text-xs text-blue-500 hover:underline flex items-center gap-1'
                            }, [
                                'Open Original',
                                h(lucide.ExternalLink, { key: 'icon', className: 'w-3 h-3' })
                            ])
                        ]),
                        h('div', { key: 'video', className: 'aspect-video bg-black rounded-lg overflow-hidden flex items-center justify-center relative' }, [
                            currentVideo ? h('embed', {
                                key: 'embed',
                                src: currentVideo.url,
                                className: 'w-full h-full border-none',
                                type: 'text/html'
                            }) : h('div', { key: 'empty', className: 'text-center text-gray-500' }, [
                                h(lucide.Video, { key: 'icon', className: 'w-12 h-12 mx-auto mb-2 opacity-20' }),
                                h('p', { key: 'text' }, 'No video selected')
                            ])
                        ]),
                        h('div', { key: 'controls', className: 'flex justify-center gap-4' }, [
                            h('button', { key: 'prev', onClick: handlePrevious, disabled: playlist.length === 0, className: 'p-3 bg-[#1e1f22] hover:bg-[#2b2d31] rounded-lg disabled:opacity-50' }, 
                                h(lucide.SkipBack, { className: 'w-5 h-5' })
                            ),
                            h('button', { key: 'next', onClick: handleNext, disabled: playlist.length === 0, className: 'p-3 bg-[#1e1f22] hover:bg-[#2b2d31] rounded-lg disabled:opacity-50' }, 
                                h(lucide.SkipForward, { className: 'w-5 h-5' })
                            )
                        ]),
                        currentVideo && h('div', { key: 'info', className: 'p-4 bg-[#1e1f22] rounded-lg' }, [
                            h('p', { key: 'title', className: 'text-sm font-semibold truncate' }, currentVideo.title),
                            h('p', { key: 'url', className: 'text-xs text-gray-500 mt-1 truncate' }, `Playing from: ${currentVideo.url}`)
                        ])
                    ])
                ])
            ]);
        };

        // Main App Component
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [sections, setSections] = useState([]);

            const fetchSections = async () => {
                const { data } = await supabase.from('link_sections').select('*').order('name');
                setSections(data || []);
            };

            useEffect(() => {
                fetchSections();
            }, []);

            const renderPage = () => {
                switch(currentPage) {
                    case 'home':
                        return h(Home, { 
                            sections, 
                            onGoToAdmin: () => setCurrentPage('admin'),
                            onGoToChat: () => setCurrentPage('chat'),
                            onGoToVideo: () => setCurrentPage('video')
                        });
                    case 'admin':
                        return h(Admin, { 
                            sections, 
                            onBack: () => setCurrentPage('home'), 
                            onRefreshSections: fetchSections 
                        });
                    case 'chat':
                        return h(PublicChat, { onBack: () => setCurrentPage('home') });
                    case 'video':
                        return h(VideoPlayer, { onBack: () => setCurrentPage('home') });
                    default:
                        return h(Home, { 
                            sections, 
                            onGoToAdmin: () => setCurrentPage('admin'),
                            onGoToChat: () => setCurrentPage('chat'),
                            onGoToVideo: () => setCurrentPage('video')
                        });
                }
            };

            return renderPage();
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(h(App));
    </script>
</body>
</html>
